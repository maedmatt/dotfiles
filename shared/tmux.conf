# Terminal
# tmux-256color supports italics and more capabilities than screen-256color,
# but may be missing on older systems. Fall back to screen-256color if needed.
if-shell 'infocmp tmux-256color >/dev/null 2>&1' \
    'set -g default-terminal "tmux-256color"' \
    'set -g default-terminal "screen-256color"'

# True color support (works on tmux 2.2+)
set -ga terminal-overrides ",*:RGB"

# OSC 52 clipboard support (allows apps to set system clipboard through tmux)
set -as terminal-overrides ",*:Ms=\\E]52;c;%p2%s\\007"
set -g set-clipboard on

# Features that require tmux 3.2+
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -cd "0-9.")" != "" ] && [ "$(echo "$(tmux -V | cut -d" " -f2 | tr -cd "0-9.") >= 3.2" | bc -l 2>/dev/null)" = "1" ]' \
    'set -as terminal-features ",*:hyperlinks"; set -as terminal-features ",*:sync"'

# Passthrough for images/sixel/kitty graphics (requires tmux 3.3+)
if-shell '[ "$(tmux -V | cut -d" " -f2 | tr -cd "0-9.")" != "" ] && [ "$(echo "$(tmux -V | cut -d" " -f2 | tr -cd "0-9.") >= 3.3" | bc -l 2>/dev/null)" = "1" ]' \
    'set -g allow-passthrough all'

# General
set -g mouse on
set -g history-limit 50000
set -g renumber-windows on

# Nvim compatibility
set -sg escape-time 10
set -g focus-events on

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Quick window switching
bind Space last-window

# Navigate panes with prefix + hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Code workspace: nvim left (62%), cc right (38%)
bind C split-window -h -l 38% -c "#{pane_current_path}" \; \
    send-keys 'claude -r' Enter \; \
    select-pane -L \; \
    send-keys 'nvim' Enter

# Vim movements in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Clipboard: copy to system clipboard via OSC 52 (cross-platform, works over SSH)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Status bar (Oxocarbon)
set -g status-interval 1
set -g status-position bottom
set -g status-bg '#262626'
set -g status-fg '#f2f4f8'
set -g status-right '#[fg=#161616,bg=#525252,bold] %d/%m #[fg=#161616,bg=#9b79e0,bold] %H:%M:%S '
set -g status-left-length 20
set -g status-right-length 50
setw -g window-status-current-format '#[fg=#be95ff] #I#[fg=#be95ff]:#[fg=#be95ff]#W#[fg=#42be65]#F '
setw -g window-status-format ' #I#[fg=#525252]:#[fg=#dde1e6]#W#[fg=#525252]#F '
